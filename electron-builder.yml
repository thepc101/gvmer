appId: com.gvmer.desktop
productName: gvmer
copyright: "Copyright © 2024 gvmer Inc."
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
  - "!dist/renderer/src/**"
  - package.json
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  license: LICENSE
  runAfterFinish: true
win:
  target:
    - nsis
mac:
  target:
    - dmg
    - zip
linux:
  target:
    - AppImage
    - deb
publish:
  provider: github
  owner: thepc101
  repo: gvmer
compression: normal
